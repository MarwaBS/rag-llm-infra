name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install (editable, dev extras incl. FAISS + Qdrant + serve)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Build wheel + sdist
        run: python -m build

      - name: Tests (FAISS / Qdrant backends + serve now exercised, not skipped)
        run: pytest -q

      - name: Retrieval eval gate (recall@1 / MRR)
        run: python -m eval.retrieval_eval

      - name: Run end-to-end example
        run: python example.py
