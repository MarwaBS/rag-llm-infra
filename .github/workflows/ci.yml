name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: this workflow only reads the repo (lint/type/test/build).
# Declaring it silences the CodeQL missing-workflow-permissions finding and
# caps the GITHUB_TOKEN even if a future step is added.
permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install (editable, dev extras incl. FAISS + Qdrant + serve)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Type-check (mypy)
        run: mypy src

      - name: Build wheel + sdist
        run: python -m build

      - name: Tests (FAISS / Qdrant backends + serve now exercised, not skipped)
        # Coverage floor: measured 93% when the gate was added; 85 is a
        # tight-but-safe ratchet, not an aspiration.
        run: pytest -q --cov=src/rag_llm_infra --cov-report=term-missing --cov-fail-under=85

      - name: Retrieval eval gate (recall@1 / MRR)
        run: python -m eval.retrieval_eval

      - name: Generation eval gate (groundedness / faithfulness)
        run: python -m eval.generation_eval

      - name: Run end-to-end example
        run: python example.py
