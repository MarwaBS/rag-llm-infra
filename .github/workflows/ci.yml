name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # The optional backends (FAISS, Qdrant, SentenceTransformers, OpenAI,
          # OpenTelemetry) are import-guarded, so the hermetic suite runs on this
          # minimal set; the FAISS/Qdrant-specific tests skip cleanly when those
          # libraries are absent. Install them locally to exercise those paths.
          pip install numpy pytest pytest-asyncio ruff

      - name: Lint (ruff)
        run: ruff check .

      - name: Run the end-to-end example
        run: python example.py

      - name: Tests (pytest)
        run: pytest -q
