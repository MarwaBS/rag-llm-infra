name: Release to PyPI

# Tag a release to publish:  git tag v0.1.0 && git push origin v0.1.0
# Requires a repository secret `PYPI_API_TOKEN` (a PyPI API token).
#
# Publishing is GATED and uses build-once / promote: the `gate` job runs the
# same lint / format / type / test / eval suite that guards `main`, then builds
# the wheel + sdist and validates THAT artifact (installs the built wheel in a
# clean venv, imports it, and checks the py.typed marker ships). The exact bytes
# it built and validated are uploaded as a workflow artifact; the `publish` job
# downloads and uploads those same bytes — it never rebuilds. So the wheel that
# reaches PyPI is bit-identical to the one the gate validated, not a fresh build
# that nothing tested. The tag must match the package version, and the upload is
# idempotent (`--skip-existing`) so a re-pushed tag does not hard-fail.

on:
  push:
    tags: ["v*"]

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (editable, dev extras incl. FAISS + Qdrant + serve)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Tag matches package version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(python -c 'import rag_llm_infra; print(rag_llm_infra.__version__)')"
          echo "tag=$tag package=$pkg"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::tag v$tag does not match package version $pkg"
            exit 1
          fi
      - name: Lint (ruff)
        run: ruff check .
      - name: Format check (ruff)
        run: ruff format --check .
      - name: Type-check (mypy)
        run: mypy src
      - name: Tests
        run: pytest -q
      - name: Retrieval eval gate (recall@1 / MRR)
        run: python -m eval.retrieval_eval
      - name: Generation eval gate (groundedness / faithfulness)
        run: python -m eval.generation_eval
      - name: Build wheel + sdist (the artifact that will ship)
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Validate the BUILT wheel (install clean, import, py.typed ships)
        run: |
          python -m venv /tmp/wheelcheck
          /tmp/wheelcheck/bin/python -m pip install --upgrade pip
          # Install the freshly built wheel only (no source tree), so this
          # validates the shippable artifact, not the editable checkout.
          wheel="$(ls dist/*.whl)"
          /tmp/wheelcheck/bin/pip install "$wheel"
          /tmp/wheelcheck/bin/python -c "import rag_llm_infra as m; print('import ok', m.__version__)"
          # PEP 561 marker must be inside the wheel for downstream type-checking.
          /tmp/wheelcheck/bin/python -c "import importlib.resources as r, sys; p = r.files('rag_llm_infra') / 'py.typed'; sys.exit(0 if p.is_file() else 'py.typed missing from installed wheel')"
      - name: Upload the validated artifact for the publish job
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 1

  publish:
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Download the exact artifact the gate built + validated
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI (promote the validated bytes, no rebuild)
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m pip install --upgrade twine
          twine check dist/*
          twine upload --non-interactive --skip-existing dist/*
