[tool.ruff]
target-version = "py312"
exclude = [".git", ".venv", "__pycache__"]

[tool.ruff.lint]
#   F — Pyflakes (real logic errors, unused imports)
#   E — pycodestyle errors (critical subset)
select = ["F", "E"]
# E402: conditional try/except imports for optional ML deps (faiss, qdrant, otel)
ignore = ["E402", "E501", "E701", "E741"]

[tool.ruff.lint.per-file-ignores]
# Tests import modules to verify importability; some imports are intentionally unused.
"tests/**" = ["F401", "F841"]
# evidence_index imports faiss solely to set FAISS_AVAILABLE.
"evidence_index.py" = ["F401"]

[tool.pytest.ini_options]
addopts = "-ra --import-mode=importlib"
asyncio_mode = "auto"
pythonpath = ["."]
markers = [
    "slow: marks tests as slow (deselect with '-m not slow')",
]
filterwarnings = [
    "ignore:.*SwigPyPacked has no __module__ attribute:DeprecationWarning",
    "ignore:.*SwigPyObject has no __module__ attribute:DeprecationWarning",
    "ignore:.*swigvarlink has no __module__ attribute:DeprecationWarning",
]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
warn_unused_ignores = false

# Infrastructure modules — fully typed.
[[tool.mypy.overrides]]
module = [
    "evidence_index",
    "llm_protocol",
    "vector_store",
    "tracing",
    "log_config",
]
disallow_untyped_defs = true
warn_return_any = false

[[tool.mypy.overrides]]
module = ["conftest"]
disallow_untyped_defs = false

[tool.coverage.run]
source = ["."]
omit = ["tests/*", ".git/*", "conftest.py", "*/__init__.py"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "if __name__ == .__main__.:",
    "raise NotImplementedError",
    "\\.\\.\\.",
]
show_missing = true
skip_empty = true
